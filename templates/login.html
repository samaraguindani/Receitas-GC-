{% extends "base.html" %}
{% block title %}Login - Receitas{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3 text-center">Acesso</h1>
        <p class="text-muted small text-center mb-4">Registro de receitas (doces e salgadas)</p>
        <form method="post" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label class="form-label" for="login">Login</label>
            <input class="form-control" id="login" name="login" required autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label" for="senha">Senha</label>
            <input type="password" class="form-control" id="senha" name="senha" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
